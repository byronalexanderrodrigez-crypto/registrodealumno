<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Sistema de Registro CONALEP</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

    <!-- PANEL IZQUIERDO -->

    <aside class="panel">

        <h2>Administrador</h2>

        <input
        id="usuario"
        placeholder="Usuario">

        <input
        id="password"
        type="password"
        placeholder="Contraseña">

        <button id="btnLogin">

            Iniciar sesión

        </button>

        <hr>

        <button
        id="cerrarSesion"
        style="display:none;">

            Cerrar sesión

        </button>

    </aside>

    <!-- CONTENIDO -->

    <main class="contenido">

        <!-- REGISTRO -->

        <section id="registroPublico">

            <h1>

                Registro de Alumnos

            </h1>

            <input id="nombre" placeholder="Nombre">

            <input id="apellido" placeholder="Apellido">

            <input id="telefono" placeholder="Número Telefónico">

            <input id="carrera" placeholder="Carrera">

            <select id="semestre">

                <option value="">Semestre</option>

                <option>1</option>
                <option>2</option>
                <option>3</option>
                <option>4</option>
                <option>5</option>
                <option>6</option>

            </select>

            <select id="turno">

                <option value="">Turno</option>

                <option>Matutino</option>

                <option>Vespertino</option>

            </select>

            <button id="guardar">

                Guardar Registro

            </button>

        </section>

        <!-- ADMIN -->

        <section
        id="panelAdmin"
        style="display:none;">

            <h1>

                Registros Guardados

            </h1>

            <input
            id="buscar"
            placeholder="Buscar Alumno...">

            <table>

                <thead>

                    <tr>

                        <th>Nombre</th>

                        <th>Apellido</th>

                        <th>Teléfono</th>

                        <th>Carrera</th>

                        <th>Semestre</th>

                        <th>Turno</th>

                        <th>Acciones</th>

                    </tr>

                </thead>

                <tbody id="tabla">

                </tbody>

            </table>

        </section>

    </main>

</div>

<script type="module" src="firebase.js"></script>

<script type="module" src="app.js"></script>

</body>

</html>
